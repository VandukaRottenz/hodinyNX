<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">

    <title>Vandukas Clock & Info</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&family=Stardos+Stencil:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    
    <style>
        @import url('https://fonts.cdnfonts.com/css/product-sans');
        @import url('https://fonts.cdnfonts.com/css/seven-segment');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            font-family: 'Product Sans', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            user-select: none; cursor: none;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
            /* Fixné okraje na bokoch celej obrazovky */
            padding: 0 5vw; 
            box-sizing: border-box;
            align-items: center;
        }

        /* Časť pre hodiny - zaberie všetok zvyšný priestor a centruje obsah */
        .clock-section {
            flex: 1; 
            display: flex;
            justify-content: center; /* Vystredenie hodín horizontálne vo svojej časti */
            align-items: center;
        }

        #time {
            font-size: 25vw; 
            font-weight: 400;
            display: flex; align-items: center;
            letter-spacing: -0.02em;
            transition: font-family 0.2s ease;
            white-space: nowrap;
        }

        /* Časť pre info panel - presne definovaná šírka */
        .info-section {
            width: 320px; /* Fixná šírka v pixeloch, aby sa panel nehýbal */
            flex-shrink: 0; /* Zakáže zmenšovanie tohto panelu */
            display: flex;
            flex-direction: column;
            border-left: 2px solid #333;
            padding-left: 40px;
            box-sizing: border-box;
        }

        .f-google { font-family: 'Product Sans', sans-serif; }
        .f-oswald { font-family: 'Oswald', sans-serif; }
        .f-stencil { font-family: 'Stardos Stencil', serif; }
        .f-lcd { font-family: 'Seven Segment', sans-serif; letter-spacing: 0.05em; }

        #sep { animation: blink 1s step-start infinite; padding: 0 0.02em; }
        @keyframes blink { 50% { opacity: 0; } }

        #date { font-size: 45px; font-weight: 400; white-space: nowrap; }
        #day-name { font-size: 30px; color: #888; text-transform: capitalize; margin-bottom: 5px; }
        #nameday { font-size: 22px; color: #4da3ff; }
        
        #weather-container { 
            margin-top: 25px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
        }
        #w-icon { font-size: 60px; }
        #temp { font-size: 60px; font-weight: 400; }

        /* UI Ovládanie */
        #ui {
            position: fixed; top: 20px; right: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 18px; border-radius: 14px;
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s; z-index: 100;
            border: 1px solid #444;
            min-width: 180px;
            cursor: default;
        }
        #ui.visible { opacity: 1; visibility: visible; }
        #font-label { color: #4da3ff; font-weight: bold; font-size: 13px; margin-bottom: 4px; font-family: sans-serif; }
        button { cursor: pointer; padding: 10px; border-radius: 8px; border: none; background: #555; color: white; font-size: 13px; }
        input[type=range] { width: 100%; }
        label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>

        function updateClock() {
            const d = new Date();
            document.getElementById('h').textContent = String(d.getHours()).padStart(2, '0');
            document.getElementById('m').textContent = String(d.getMinutes()).padStart(2, '0');

            const day = d.getDate();
            const month = d.getMonth();
            const year = d.getFullYear();
            document.getElementById('date').textContent = `${String(day).padStart(2, '0')}.${String(month + 1).padStart(2, '0')}.${year}`;
            document.getElementById('day-name').textContent = d.toLocaleDateString('sk-SK', { weekday: 'long' });

            const key = `${month}-${day}`;
            document.getElementById('nameday').textContent = "meniny: " + (slovakNames[key] || "-");
        }

        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=sk`);
                const data = await response.json();
                
                if (data.cod === 200) {
                    const temp = Math.round(data.main.temp);
                    const iconCode = data.weather[0].icon;
                    document.getElementById('temp').textContent = `${temp}°C`;
                    updateWeatherIcon(iconCode);
                }
            } catch (error) {
                console.error("Chyba pri načítaní počasia:", error);
            }
        }

        function updateWeatherIcon(code) {
            const iconMap = {
                "01d": "wb_sunny", "01n": "nightlight_round",
                "02d": "partly_cloudy_day", "02n": "partly_cloudy_night",
                "03d": "cloud", "03n": "cloud",
                "04d": "cloudy", "04n": "cloudy",
                "09d": "rainy", "09n": "rainy",
                "10d": "cloudy_snowing", "10n": "cloudy_snowing",
                "11d": "thunderstorm", "11n": "thunderstorm",
                "13d": "ac_unit", "13n": "ac_unit",
                "50d": "foggy", "50n": "foggy"
            };
            document.getElementById('w-icon').textContent = iconMap[code] || "device_thermostat";
        }

        function changeFont() {
            const clock = document.getElementById('time');
            const label = document.getElementById('font-label');
            clock.classList.remove(fontData[idx].id);
            idx = (idx + 1) % fontData.length;
            clock.classList.add(fontData[idx].id);
            label.textContent = fontData[idx].n;
            showUI(); 
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {
                    alert("Fullscreen nie je podporovaný.");
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function updateSize(v) {
            document.getElementById('time').style.fontSize = v + 'vw';
        }

        function showUI() {
            document.getElementById('ui').classList.add('visible');
            document.body.classList.add('active');
            clearTimeout(timer);
            timer = setTimeout(hideUI, 3500);
        }

        function hideUI() {
            document.getElementById('ui').classList.remove('visible');
            document.body.classList.remove('active');
        }

        setInterval(updateClock, 1000);
        updateClock();
        fetchWeather();
        setInterval(fetchWeather, 900000); // 15 minút
